name: Infra CI
run-name: ${{ github.workflow }}

on:
  push:
    paths:
      - "infra/pipeline/**"

  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
    paths:
      - "infra/pipeline/**"

defaults:
  run:
    working-directory: infra/pipeline

jobs:
  terraform-ci:
    runs-on: ubuntu-latest

    env:
      TF_VAR_project_name: ${{ secrets.TF_project_name }}
      TF_VAR_artifact_repo_id: ${{ secrets.TF_artifact_repo_id }}
      TF_VAR_instance_name: ${{ secrets.TF_instance_name }}
      TF_VAR_db_name: ${{ secrets.TF_db_name }}
      TF_VAR_db_user: ${{ secrets.TF_db_user }}
      TF_VAR_db_password: ${{ secrets.TF_db_password }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check for ENV
        run: echo "$TF_VAR_project_name"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.6

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  terraform-plan:
    needs: terraform-ci
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Terraform setup
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.6

      - name: Authenticate
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Terraform init
        run: terraform init

      - name: Terraform Plan
        timeout-minutes: 5
        run: terraform plan -no-color -input=false -lock-timeout=60s

  terraform-pull_request-merged:
    needs: terraform-ci
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Terraform setup
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.6

      - name: Authenticate
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Terraform init
        run: terraform init

      - name: Terraform Plan
        timeout-minutes: 5
        run: terraform plan -no-color -input=false -lock-timeout=60s

      - name: Terraform Apply
        if: success()
        run: terraform apply -auto-approve
